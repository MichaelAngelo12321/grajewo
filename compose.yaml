version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      DATABASE_URL: "mysql://root:password@database:3306/app?serverVersion=11.2.2-MariaDB&charset=utf8mb4"
      APP_ENV: dev
      APP_SECRET: 1582665086ea0f0446de9feb261e01f1
      MAILER_DSN: smtp://mailer:1025
      # Weather API
      APP_AIR_POLLUTION_DATA_URL: ${APP_AIR_POLLUTION_DATA_URL:-}
      APP_WEATHER_API_KEY: ${APP_WEATHER_API_KEY:-}
      APP_WEATHER_API_LAT: ${APP_WEATHER_API_LAT:-}
      APP_WEATHER_API_LON: ${APP_WEATHER_API_LON:-}
      # ReCaptcha
      RECAPTCHA3_KEY: ${RECAPTCHA3_KEY:-}
      RECAPTCHA3_SECRET: ${RECAPTCHA3_SECRET:-}
      RECAPTCHA3_ENABLED: ${RECAPTCHA3_ENABLED:-false}
    depends_on:
      - database
      - mailer

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

###> doctrine/doctrine-bundle ###
  database:
    image: mariadb:${MARIADB_VERSION:-11.2}
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      # You should definitely change the password in production
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-password}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-!ChangeMe!}
    volumes:
      - database_data:/var/lib/mysql:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
    ports:
      - "3306:3306"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: schickling/mailcatcher
    ports: ["1025:1025", "1080:1080"]
###< symfony/mailer ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
