  path: /panel/gas-station
  controller: App\Controller\Panel\GasPriceController::stationList

panel_gas_station_change_order:
  path: /panel/gas-station/change-order
  controller: App\Controller\Panel\GasPriceController::changeStationOrder

panel_gas_station_create:
  path: /panel/gas-station/create
  controller: App\Controller\Panel\GasPriceController::createStation

panel_gas_station_delete:
