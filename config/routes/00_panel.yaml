panel_dashboard:
  path: /panel
  controller: App\Controller\Panel\DashboardController::index

panel_dashboard_publish_daily_image:
  path: /panel/publish-daily-image/{imageId}
  controller: App\Controller\Panel\DashboardController::publishDailyImage

panel_dashboard_remove_daily_image:
  path: /panel/remove-daily-image/{imageId}
  controller: App\Controller\Panel\DashboardController::removeDailyImage

panel_dashboard_publish_daily_video:
  path: /panel/publish-daily-video/{videoId}
  controller: App\Controller\Panel\DashboardController::publishDailyVideo

panel_dashboard_remove_daily_video:
  path: /panel/remove-daily-video/{videoId}
  controller: App\Controller\Panel\DashboardController::removeDailyVideo

panel_dashboard_publish_user_gas_station_price:
  path: /panel/publish-user-gas-price/{gasStationPriceId}
  controller: App\Controller\Panel\DashboardController::publishUserGasStationPrice

panel_dashboard_remove_user_gas_station_price:
  path: /panel/remove-user-gas-price/{gasStationPriceId}
  controller: App\Controller\Panel\DashboardController::removeUserGasStationPrice

panel_dashboard_save_next_sunday_is_shopping:
  path: /panel/save-next-sunday-is-shopping
  methods: [ POST ]
  controller: App\Controller\Panel\DashboardController::saveNextSundayIsShopping

panel_dashboard_save_pharmacy_duty:
  path: /panel/save-pharmacy-duty
  methods: [ POST ]
  controller: App\Controller\Panel\DashboardController::savePharmacyDuty

# Auth
panel_login:
  path: /panel/login
  controller: App\Controller\Panel\SecurityController::login

panel_logout:
  path: /panel/logout
  controller: App\Controller\Panel\SecurityController::logout

# Articles
panel_article_change_status:
  path: /panel/articles/{id}/change-status/{status}
  controller: App\Controller\Panel\ArticleController::changeStatus

panel_article_delete:
  path: /panel/articles/{id}/delete
  controller: App\Controller\Panel\ArticleController::delete

panel_article_edit:
  path: /panel/articles/{id}/edit
  controller: App\Controller\Panel\ArticleController::edit

panel_article_list:
  path: /panel/articles
  controller: App\Controller\Panel\ArticleController::list

panel_article_create:
  path: /panel/articles/create
  controller: App\Controller\Panel\ArticleController::create

panel_article_comment_hide:
  path: /panel/articles/comments/{commentId}/hide
  controller: App\Controller\Panel\ArticleCommentController::hideComment

panel_article_comment_unlock:
  path: /panel/articles/comments/{commentId}/unlock
  controller: App\Controller\Panel\ArticleCommentController::unlockComment

# Categories
panel_categories_change_order:
  path: /panel/categories/change-order
  controller: App\Controller\Panel\CategoryController::changeOrder

panel_categories_create:
  path: /panel/categories/create
  controller: App\Controller\Panel\CategoryController::create

panel_categories_edit:
  path: /panel/categories/{id}/edit
  controller: App\Controller\Panel\CategoryController::edit

panel_categories_list:
  path: /panel/categories
  controller: App\Controller\Panel\CategoryController::list

panel_categories_delete:
  path: /panel/categories/{id}/delete
  controller: App\Controller\Panel\CategoryController::delete

panel_categories_move_articles:
  path: /panel/categories/move-articles/{fromCategoryId}/{toCategoryId}
  controller: App\Controller\Panel\CategoryController::moveArticles

# User report
panel_user_report_hide:
  path: /panel/user-report/{reportId}/hide
  controller: App\Controller\Panel\UserReportController::hideReport

panel_user_report_unlock:
  path: /panel/user-report/{reportId}/unlock
  controller: App\Controller\Panel\UserReportController::unlockReport

# Gas prices
