homepage:
  path: /
  controller: App\Controller\HomeController::index

# User report
user_report:
  path: /raport
  controller: App\Controller\UserReportController::index

user_report_add:
  path: /raport/dodaj
  controller: App\Controller\UserReportController::add

# Advertisement
advertisement_add:
  path: /ogloszenia/dodaj
  controller: App\Controller\AdvertisementController::add

advertisement_list:
  path: /ogloszenia/{category}
  controller: App\Controller\AdvertisementController::list
  defaults:
    category: null
  requirements:
    category: '[a-z0-9-]*'

# Search
search:
  path: /szukaj
  controller: App\Controller\SearchController::index

# Company Catalog
company_add:
  path: /katalog-firm/dodaj
  controller: App\Controller\CompanyController::add

company_details:
  path: /katalog-firm/szczegoly/{slug}
  controller: App\Controller\CompanyController::details

company_list:
  path: /katalog-firm/{categorySlug}
  controller: App\Controller\CompanyController::list
  defaults:
    categorySlug: null

# Polls
poll_vote:
  path: /ankieta/glosuj/{id}
  controller: App\Controller\PollController::vote

# Article category redirects
article_category_old_redirect:
  path: /dzial-{__category}
  controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
  defaults:
    route: article_category
    permanent: true

# Article details
article_details_old_redirect:
  path: /info/{slug}.{id}.html
  controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
  defaults:
    _locale: pl
    __category: info
    route: article_details
    permanent: true

article_details:
  path: /{__category}/{id}/{slug}
  controller: App\Controller\ArticleController::details
  requirements:
    id: \d+

article_events_list_date:
  path: /kalendarz-wydarzen/{date}
  controller: App\Controller\ArticleController::eventsListDate

article_events_list:
  path: /kalendarz-wydarzen
  controller: App\Controller\ArticleController::eventsList

# Galleries
gallery_details:
  path: /galeria/{id}
  controller: App\Controller\GalleryController::details

gallery_list:
  path: /galerie
  controller: App\Controller\GalleryController::list

# Promo item redirect
promo_redirect:
  path: /promo/redirect/{id}/{redirectUrl}
  controller: App\Controller\PromoItemController::targetUrlRedirect
  requirements:
    id: \d+
    redirectUrl: .*

promo_item_render_slot:
  path: /promo/render/{slot}
  controller: App\Controller\PromoItemController::renderSlot

# User content
user_content_add_image_form:
  path: /przeslij/zdjecie
  controller: App\Controller\UserContentController::addImage

user_content_add_video_form:
  path: /przeslij/film
  controller: App\Controller\UserContentController::addVideo

user_content_add_gas_station_prices_form:
  path: /przeslij/ceny-paliw
  controller: App\Controller\UserContentController::addGasStationPrices

user_content_thank_you:
  path: /przeslij/dziekujemy
  controller: App\Controller\UserContentController::thankYouPage

# Static pages
static_page_show:
  path: /info/{slug}
  controller: App\Controller\StaticPageController::show

# Catch-all Article category (MUST BE LAST)
article_category:
  path: /{__category}
  controller: App\Controller\ArticleController::list
